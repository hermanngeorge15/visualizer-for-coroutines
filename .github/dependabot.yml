version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/frontend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "frontend"
    groups:
      react:
        patterns:
          - "react*"
          - "@types/react*"
      tanstack:
        patterns:
          - "@tanstack/*"
      heroui:
        patterns:
          - "@heroui/*"
      testing:
        patterns:
          - "vitest"
          - "@testing-library/*"
          - "msw"
      build:
        patterns:
          - "vite"
          - "@vitejs/*"
          - "typescript"
          - "tailwindcss"
          - "postcss"
          - "autoprefixer"

  - package-ecosystem: "npm"
    directory: "/shared/api-types"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "shared"

  - package-ecosystem: "gradle"
    directory: "/backend"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 10
    labels:
      - "dependencies"
      - "backend"
    groups:
      ktor:
        patterns:
          - "io.ktor:*"
      kotlin:
        patterns:
          - "org.jetbrains.kotlin*"
          - "org.jetbrains.kotlinx:*"
      testing:
        patterns:
          - "io.mockk:*"
          - "org.junit*"

  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "ci"
