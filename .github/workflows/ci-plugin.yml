name: CI IntelliJ Plugin

on:
  push:
    branches: [main]
    paths: ['intellij-plugin/**', 'backend/coroutine-viz-core/**']
  pull_request:
    branches: [main]
    paths: ['intellij-plugin/**', 'backend/coroutine-viz-core/**']

jobs:
  build-plugin:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: ktlint
        run: ./gradlew :intellij-plugin:ktlintCheck

      - name: detekt
        run: ./gradlew :intellij-plugin:detekt

      - name: Build core library
        run: ./gradlew :coroutine-viz-core:jar

      - name: Build plugin
        run: ./gradlew :intellij-plugin:buildPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin
          path: intellij-plugin/build/distributions/*.zip
          retention-days: 14
