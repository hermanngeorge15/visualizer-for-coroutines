name: Publish to Maven

on:
  workflow_dispatch:
    inputs:
      version_override:
        description: 'Version override (leave empty to use build.gradle.kts version)'
        required: false
        type: string
  release:
    types: [published]

permissions:
  contents: read
  packages: write

env:
  JAVA_VERSION: '21'

jobs:
  publish:
    name: Publish coroutine-viz-core to GitHub Packages
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run core tests
        run: ./gradlew :coroutine-viz-core:test

      - name: Resolve publish version
        id: version
        run: |
          if [[ -n "${{ inputs.version_override }}" ]]; then
            echo "VERSION=${{ inputs.version_override }}" >> "$GITHUB_OUTPUT"
          elif [[ "${{ github.event_name }}" == "release" ]]; then
            # Strip leading 'v' from release tag
            TAG="${{ github.event.release.tag_name }}"
            echo "VERSION=${TAG#v}" >> "$GITHUB_OUTPUT"
          else
            # Fall back to version in build.gradle.kts
            VERSION=$(grep -oP 'version\s*=\s*"\K[^"]+' coroutine-viz-core/build.gradle.kts | head -1)
            echo "VERSION=${VERSION}" >> "$GITHUB_OUTPUT"
          fi

      - name: Publish to GitHub Packages
        run: ./gradlew :coroutine-viz-core:publish -Pversion=${{ steps.version.outputs.VERSION }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GITHUB_ACTOR: ${{ github.actor }}

      - name: Summary
        run: |
          echo "### Published coroutine-viz-core" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Version:** ${{ steps.version.outputs.VERSION }}" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Registry:** GitHub Packages" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Group:** com.jh.coroutine-visualizer" >> "$GITHUB_STEP_SUMMARY"
          echo "- **Artifact:** coroutine-viz-core" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo '```kotlin' >> "$GITHUB_STEP_SUMMARY"
          echo "implementation(\"com.jh.coroutine-visualizer:coroutine-viz-core:${{ steps.version.outputs.VERSION }}\")" >> "$GITHUB_STEP_SUMMARY"
          echo '```' >> "$GITHUB_STEP_SUMMARY"
