name: Release

on:
  push:
    tags: ['v*']

permissions:
  contents: write
  packages: write

env:
  JAVA_VERSION: '21'
  NODE_VERSION: '24'
  PNPM_VERSION: '9'

jobs:
  # ---------------------------------------------------------------------------
  # Job 1: Build and test coroutine-viz-core, publish JAR artifact
  # ---------------------------------------------------------------------------
  build-core:
    name: Build Core Library
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Run core tests
        run: ./gradlew :coroutine-viz-core:test

      - name: Build core JAR
        run: ./gradlew :coroutine-viz-core:jar

      - name: Build sources JAR
        run: ./gradlew :coroutine-viz-core:sourcesJar

      - name: Upload core JAR
        uses: actions/upload-artifact@v4
        with:
          name: coroutine-viz-core-jar
          path: backend/coroutine-viz-core/build/libs/*.jar
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 2: Build frontend static assets
  # ---------------------------------------------------------------------------
  build-frontend:
    name: Build Frontend
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: frontend

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: ${{ env.PNPM_VERSION }}

      - uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: pnpm
          cache-dependency-path: frontend/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Type check
        run: npx tsc --noEmit

      - name: Run tests
        run: pnpm test

      - name: Build production bundle
        run: pnpm build

      - name: Archive frontend dist
        run: tar -czf frontend-dist.tar.gz -C dist .

      - name: Upload frontend dist
        uses: actions/upload-artifact@v4
        with:
          name: frontend-dist
          path: frontend/frontend-dist.tar.gz
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 3: Build IntelliJ plugin ZIP
  # ---------------------------------------------------------------------------
  build-plugin:
    name: Build IntelliJ Plugin
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: ${{ env.JAVA_VERSION }}
          cache: gradle

      - name: Grant execute permission
        run: chmod +x gradlew

      - name: Build core dependency
        run: ./gradlew :coroutine-viz-core:jar

      - name: Build IntelliJ plugin
        run: ./gradlew :intellij-plugin:buildPlugin

      - name: Verify plugin
        run: ./gradlew :intellij-plugin:verifyPlugin

      - name: Upload plugin ZIP
        uses: actions/upload-artifact@v4
        with:
          name: intellij-plugin-zip
          path: intellij-plugin/build/distributions/*.zip
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Job 4: Create GitHub Release with all artifacts
  # ---------------------------------------------------------------------------
  create-release:
    name: Create GitHub Release
    needs: [build-core, build-frontend, build-plugin]
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history for changelog generation

      - name: Download core JAR
        uses: actions/download-artifact@v4
        with:
          name: coroutine-viz-core-jar
          path: release-assets/core

      - name: Download frontend dist
        uses: actions/download-artifact@v4
        with:
          name: frontend-dist
          path: release-assets/frontend

      - name: Download IntelliJ plugin
        uses: actions/download-artifact@v4
        with:
          name: intellij-plugin-zip
          path: release-assets/plugin

      - name: Extract version from tag
        id: version
        run: echo "VERSION=${GITHUB_REF_NAME#v}" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          chmod +x scripts/generate-changelog.sh
          CHANGELOG=$(scripts/generate-changelog.sh)
          # Write to file for the release body (handles multiline safely)
          echo "$CHANGELOG" > release-notes.md

      - name: List release assets
        run: find release-assets -type f | sort

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.ref_name }}
          name: Coroutine Visualizer ${{ github.ref_name }}
          body_path: release-notes.md
          draft: false
          prerelease: ${{ contains(github.ref_name, '-rc') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-beta') }}
          files: |
            release-assets/core/*.jar
            release-assets/frontend/frontend-dist.tar.gz
            release-assets/plugin/*.zip
          fail_on_unmatched_files: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
