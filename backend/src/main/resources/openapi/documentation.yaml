      summary: Compare two sessions
      description: >
        Produces a structured diff between two visualization sessions. The
        comparison includes aggregate differences (coroutine count, event
        count, duration), coroutines unique to each session, and per-coroutine
        state and event count comparisons for shared coroutines.
      operationId: compareSessions
      parameters:
        - name: sessionA
          in: query
          required: true
          description: ID of the first (baseline) session
          schema:
            type: string
        - name: sessionB
          in: query
          required: true
          description: ID of the second (comparison) session
          schema:
            type: string
      responses:
        "200":
          description: Session comparison results
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionComparison"
        "400":
          description: Missing required query parameters
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: One or both sessions not found
          content:
