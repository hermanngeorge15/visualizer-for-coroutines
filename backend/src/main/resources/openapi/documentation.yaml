openapi: "3.0.3"
info:
  title: "Coroutine Visualizer API"
  description: >
    REST and SSE API for the Kotlin Coroutine Visualizer. Provides endpoints
    to manage visualization sessions, run built-in and custom coroutine
    scenarios, stream events in real time via SSE, query coroutine hierarchy
    and thread activity, and validate event streams against structured
    concurrency rules.
  version: "1.0.0"
  contact:
    name: "Coroutine Visualizer"
servers:
  - url: "http://0.0.0.0:8080"
    description: "Local development server"

tags:
  - name: Root
    description: Root and SSE smoke-test endpoints
  - name: Health
    description: Application health and readiness checks
  - name: Sessions
    description: Create, list, inspect, and delete visualization sessions
  - name: Events
    description: Retrieve recorded events and stream live events via SSE
  - name: Projections
    description: Hierarchy trees, thread activity, and coroutine timelines
  - name: Validation
    description: Validate event streams against structured concurrency rules
  - name: Scenarios - Basic
    description: Built-in basic coroutine scenarios (nested, parallel, cancellation, etc.)
  - name: Scenarios - Channel
    description: Channel communication pattern scenarios (rendezvous, buffered, fan-out)
  - name: Scenarios - Realistic
    description: Real-world service simulation scenarios (order processing, registration, reports)
  - name: Scenarios - Flow
    description: Kotlin Flow scenarios (simple, operators, StateFlow, SharedFlow)
  - name: Scenarios - Patterns
    description: Concurrency pattern scenarios (retry, producer-consumer, fan-out/fan-in, supervisor, circuit breaker)
  - name: Scenarios - Sync
    description: Synchronization primitive scenarios (Mutex, Semaphore, combined)
  - name: Scenarios - Custom
    description: User-defined custom scenario execution
  - name: Scenarios - Catalog
    description: List available scenarios in each category
  - name: Comparison
    description: Compare two visualization sessions side by side
  - name: Viz
    description: Quick visualization helpers and example scenarios
  - name: Tests
    description: Legacy test runner (deprecated, redirects to /api/scenarios)

paths:
  # ==========================================================================
  # ROOT
  # ==========================================================================
  /:
    get:
      tags: [Root]
      summary: Root health probe
      description: >
        Returns a plain-text greeting. Useful as a quick connectivity check.
      operationId: getRoot
      responses:
        "200":
          description: Plain-text greeting
          content:
            text/plain:
              schema:
                type: string
              examples:
                greeting:
                  value: "Hello World!"

  /hello:
    get:
      tags: [Root]
      summary: SSE smoke test
      description: >
        Opens a Server-Sent Events stream that emits a single event with
        data "world". Useful for verifying that SSE transport works.
      operationId: getSseHello
      responses:
        "200":
          description: SSE stream with one event
          content:
            text/event-stream:
              schema:
                type: string
                description: SSE stream; single event with data "world"

  # ==========================================================================
  # HEALTH
  # ==========================================================================
  /health:
    get:
      tags: [Health]
      summary: Application health status
      description: >
        Returns the current health of the application including active session
        count, uptime, and JVM memory usage. Returns HTTP 200 when healthy and
        HTTP 503 when memory usage exceeds 90%.
      operationId: getHealth
      responses:
        "200":
          description: Application is healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"
        "503":
          description: Application is degraded (memory usage above 90%)
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  # ==========================================================================
  # SESSIONS
  # ==========================================================================
  /api/sessions:
    post:
      tags: [Sessions]
      summary: Create a new visualization session
      description: >
        Creates a new empty visualization session. An optional name can be
        provided via query parameter; otherwise a default name is assigned.
      operationId: createSession
      parameters:
        - name: name
          in: query
          required: false
          description: Human-readable name for the session
          schema:
            type: string
      responses:
        "201":
          description: Session created successfully
          content:
            application/json:
              schema:
                type: object
                required: [sessionId, message]
                properties:
                  sessionId:
                    type: string
                    description: Unique identifier for the created session
                  message:
                    type: string
                    description: Confirmation message
        "500":
          description: Internal server error
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    get:
      tags: [Sessions]
      summary: List all active sessions
      description: >
        Returns a summary of every active visualization session including
        session ID, coroutine count, and event count.
      operationId: listSessions
      responses:
        "200":
          description: Array of session summaries
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/SessionInfo"

  /api/sessions/{id}:
    get:
      tags: [Sessions]
      summary: Get session snapshot
      description: >
        Returns the current state snapshot of a visualization session including
        all tracked coroutines and their current states.
      operationId: getSession
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Session snapshot
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SessionSnapshotResponse"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

    delete:
      tags: [Sessions]
      summary: Close and delete a session
      description: >
        Closes the specified session and releases all associated resources.
        Active SSE streams for this session will be terminated.
      operationId: deleteSession
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Session closed successfully
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: "Session closed"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================================
  # EVENTS
  # ==========================================================================
  /api/sessions/{id}/events:
    get:
      tags: [Events]
      summary: Get all recorded events
      description: >
        Returns every event recorded in the session's event store, ordered by
        sequence number. Each event is a polymorphic VizEvent.
      operationId: getSessionEvents
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Array of VizEvent objects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/VizEvent"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sessions/{id}/stream:
    get:
      tags: [Events]
      summary: Stream events via SSE
      description: >
        Opens a Server-Sent Events connection for the given session. On
        connect the server first replays all stored events (history), then
        switches to streaming live events as they are produced. Each SSE
        message has an `event` field set to the event kind (e.g.
        "CoroutineCreated"), an `id` field of the form
        `{sessionId}-{seq}`, and a JSON-encoded VizEvent as data.
      operationId: streamSessionEvents
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: SSE event stream
          content:
            text/event-stream:
              schema:
                type: string
                description: >
                  Server-Sent Events stream. Each event carries a JSON-encoded
                  VizEvent in its data field.
        "404":
          description: Session not found (sent as SSE error event)

  # ==========================================================================
  # PROJECTIONS
  # ==========================================================================
  /api/sessions/{id}/hierarchy:
    get:
      tags: [Projections]
      summary: Get coroutine hierarchy tree
      description: >
        Returns the parent-child hierarchy of all coroutines in the session.
        Optionally filter to a specific scope by providing the scopeId
        query parameter.
      operationId: getSessionHierarchy
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
        - name: scopeId
          in: query
          required: false
          description: Filter hierarchy to coroutines within this scope ID
          schema:
            type: string
      responses:
        "200":
          description: Array of hierarchy nodes forming the coroutine tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/HierarchyNode"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sessions/{id}/threads:
    get:
      tags: [Projections]
      summary: Get thread activity
      description: >
        Returns a list of thread assignment and release events, showing which
        coroutines ran on which threads and when. Useful for rendering thread
        lane visualizations.
      operationId: getSessionThreads
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Array of thread activity events
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ThreadEvent"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/sessions/{id}/coroutines/{coroutineId}/timeline:
    get:
      tags: [Projections]
      summary: Get coroutine timeline
      description: >
        Returns a detailed timeline for a single coroutine, including total
        duration, active/suspended time breakdown, parent-child relationships,
        and an ordered list of timeline event summaries.
      operationId: getCoroutineTimeline
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
        - name: coroutineId
          in: path
          required: true
          description: Unique coroutine identifier
          schema:
            type: string
      responses:
        "200":
          description: Coroutine timeline data
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/CoroutineTimeline"
        "400":
          description: Missing session ID or coroutine ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session or coroutine not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================================
  # VALIDATION
  # ==========================================================================
  /api/validate/session/{id}:
    post:
      tags: [Validation]
      summary: Validate session events
      description: >
        Runs all structured concurrency validators against the event stream
        of the specified session. Checks include lifecycle validation,
        hierarchy correctness, structured concurrency rules, sequence
        uniqueness, and timing analysis.
      operationId: validateSession
      parameters:
        - $ref: "#/components/parameters/SessionIdPath"
      responses:
        "200":
          description: Validation results and timing report
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ValidationResponse"
        "400":
          description: Missing session ID
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "404":
          description: Session not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/validate/rules:
    get:
      tags: [Validation]
      summary: List available validation rules
      description: >
        Returns the list of all validation rules that are executed during
        session validation, including each rule's name and description.
      operationId: getValidationRules
      responses:
        "200":
          description: Array of validation rule descriptors
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ValidationRule"

  # ==========================================================================
  # SCENARIOS - CATALOG
  # ==========================================================================
  /api/scenarios:
    get:
      tags: [Scenarios - Catalog]
      summary: List all general scenarios
      description: >
        Returns the catalog of built-in scenarios across all categories
        (realistic, channel, basic). Each entry includes the scenario ID,
        display name, description, HTTP endpoint, category, and estimated
        duration.
      operationId: listScenarios
      responses:
        "200":
          description: Scenario catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenarios:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScenarioCatalogEntry"

  /api/scenarios/flow:
    get:
      tags: [Scenarios - Catalog]
      summary: List Flow scenarios
      description: >
        Returns the catalog of Flow-specific scenarios (simple, operators,
        StateFlow, SharedFlow).
      operationId: listFlowScenarios
      responses:
        "200":
          description: Flow scenario catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenarios:
                    type: array
                    items:
                      $ref: "#/components/schemas/ScenarioCatalogEntry"

  /api/scenarios/patterns:
    get:
      tags: [Scenarios - Catalog]
      summary: List concurrency pattern scenarios
      description: >
        Returns the catalog of concurrency pattern scenarios (retry,
        producer-consumer, fan-out/fan-in, supervisor, circuit breaker).
      operationId: listPatternScenarios
      responses:
        "200":
          description: Pattern scenario catalog
          content:
            application/json:
              schema:
                type: object
                properties:
                  scenarios:
                    type: array
                    items:
                      $ref: "#/components/schemas/PatternInfo"

  /api/sync/scenarios:
    get:
      tags: [Scenarios - Catalog]
      summary: List synchronization scenarios
      description: >
        Returns the catalog of synchronization primitive scenarios (Mutex,
        Semaphore, combined). Each entry includes path, name, type, and
        description.
      operationId: listSyncScenarios
      responses:
        "200":
          description: Sync scenario catalog
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/ScenarioInfo"

  # ==========================================================================
  # SCENARIOS - BASIC
  # ==========================================================================
  /api/scenarios/nested:
    post:
      tags: [Scenarios - Basic]
      summary: Run nested coroutines scenario
      description: >
        Executes a scenario demonstrating parent-child relationships and
        structured concurrency. Creates a new session or reuses an existing one.
      operationId: runNestedScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/parallel:
    post:
      tags: [Scenarios - Basic]
      summary: Run parallel execution scenario
      description: >
        Executes a scenario with multiple coroutines running in parallel.
      operationId: runParallelScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/cancellation:
    post:
      tags: [Scenarios - Basic]
      summary: Run cancellation scenario
      description: >
        Executes a scenario demonstrating coroutine cancellation and cleanup
        behavior.
      operationId: runCancellationScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/deep-nesting:
    post:
      tags: [Scenarios - Basic]
      summary: Run deep nesting scenario
      description: >
        Executes a scenario creating a deeply nested hierarchy of coroutines.
        The depth is configurable via query parameter (default 5).
      operationId: runDeepNestingScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
        - name: depth
          in: query
          required: false
          description: Nesting depth (default 5)
          schema:
            type: integer
            default: 5
            minimum: 1
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/mixed:
    post:
      tags: [Scenarios - Basic]
      summary: Run mixed sequential/parallel scenario
      description: >
        Executes a scenario combining sequential and parallel coroutine
        execution patterns.
      operationId: runMixedScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/exception:
    post:
      tags: [Scenarios - Basic]
      summary: Run exception handling scenario
      description: >
        Executes a scenario demonstrating exception tracking and failure state
        transitions in coroutines.
      operationId: runExceptionScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================================
  # SCENARIOS - CHANNEL
  # ==========================================================================
  /api/scenarios/channel-rendezvous:
    post:
      tags: [Scenarios - Channel]
      summary: Run channel rendezvous scenario
      description: >
        Zero-buffer channel where sender and receiver must meet for each
        transfer. Demonstrates suspension on both sides when one party is
        not ready.
      operationId: runChannelRendezvousScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/channel-buffered:
    post:
      tags: [Scenarios - Channel]
      summary: Run channel buffered scenario
      description: >
        Buffered channel (capacity 3) showing buffer fill and drain behavior.
        Producer sends 5 items; consumer starts after a delay.
      operationId: runChannelBufferedScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/channel-fan-out:
    post:
      tags: [Scenarios - Channel]
      summary: Run channel fan-out scenario
      description: >
        Fan-out pattern: one producer dispatches 10 tasks and 3 workers
        compete to receive and process them.
      operationId: runChannelFanOutScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================================
  # SCENARIOS - REALISTIC
  # ==========================================================================
  /api/scenarios/order-processing:
    post:
      tags: [Scenarios - Realistic]
      summary: Run order processing scenario
      description: >
        Simulates an e-commerce order flow: validation, inventory check,
        payment processing, database persistence, and parallel notifications.
        Use the fail parameter to simulate a payment failure.
      operationId: runOrderProcessingScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
        - name: fail
          in: query
          required: false
          description: When true, simulates a payment failure mid-flow
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/user-registration:
    post:
      tags: [Scenarios - Realistic]
      summary: Run user registration scenario
      description: >
        Simulates a full user registration flow: input validation, database
        uniqueness check, user creation, parallel setup tasks (profile,
        settings, avatar), and notification delivery. Use the failEmail
        parameter to simulate email delivery retry.
      operationId: runUserRegistrationScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
        - name: failEmail
          in: query
          required: false
          description: When true, simulates an email delivery failure triggering retry
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/report-generation:
    post:
      tags: [Scenarios - Realistic]
      summary: Run report generation scenario
      description: >
        Simulates a data pipeline: parallel API fetches, data aggregation,
        PDF generation, and parallel delivery (S3 upload, email, Slack
        notification). Use the timeout parameter to simulate an API timeout.
      operationId: runReportGenerationScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
        - name: timeout
          in: query
          required: false
          description: When true, simulates an API timeout during data fetching
          schema:
            type: boolean
            default: false
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  # ==========================================================================
  # SCENARIOS - FLOW
  # ==========================================================================
  /api/scenarios/flow/simple:
    post:
      tags: [Scenarios - Flow]
      summary: Run simple Flow scenario
      description: >
        Emits and collects 5 values from a cold Flow, demonstrating basic
        Flow creation and collection.
      operationId: runFlowSimpleScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/flow/operators:
    post:
      tags: [Scenarios - Flow]
      summary: Run Flow operators scenario
      description: >
        Demonstrates chaining map and filter operators on a Flow, showing
        how values are transformed and filtered through the operator pipeline.
      operationId: runFlowOperatorsScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /api/scenarios/flow/stateflow:
    post:
      tags: [Scenarios - Flow]
      summary: Run StateFlow scenario
      description: >
        Demonstrates mutable state management with StateFlow and multiple
        observers reacting to state changes.
      operationId: runFlowStateFlowScenario
      parameters:
        - $ref: "#/components/parameters/SessionIdQuery"
      responses:
        "200":
          description: Scenario completed successfully
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ScenarioCompletionResponse"
        "500":
          description: Scenario execution failed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

