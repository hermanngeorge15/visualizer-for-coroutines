# ===========================================================================
# COMPONENTS
# ===========================================================================
components:
  # =========================================================================
  # PARAMETERS
  # =========================================================================
  parameters:
    SessionIdPath:
      name: id
      in: path
      required: true
      description: Unique session identifier
      schema:
        type: string

    SessionIdQuery:
      name: sessionId
      in: query
      required: false
      description: >
        Existing session ID to reuse. If omitted, a new session is created
        automatically.
      schema:
        type: string

  # =========================================================================
  # SCHEMAS
  # =========================================================================
  schemas:
    # -----------------------------------------------------------------------
    # Error
    # -----------------------------------------------------------------------
    ErrorResponse:
      type: object
      description: Standard error envelope returned on 4xx/5xx responses
      required: [error]
      properties:
        error:
          type: string
          description: Human-readable error message

    # -----------------------------------------------------------------------
    # Health
    # -----------------------------------------------------------------------
    HealthStatus:
      type: object
      description: >
        Application health report including uptime, active session count,
        and JVM memory usage.
      required: [status, sessions, uptimeMs, memory]
      properties:
        status:
          type: string
          description: "Health status: UP or DEGRADED"
          enum: [UP, DEGRADED]
        sessions:
          type: integer
          description: Number of currently active visualization sessions
        uptimeMs:
          type: integer
          format: int64
          description: Milliseconds since the application started
        memory:
          $ref: "#/components/schemas/MemoryInfo"

    MemoryInfo:
      type: object
      description: JVM heap memory usage statistics
      required: [usedMb, maxMb, usagePercent]
      properties:
        usedMb:
          type: integer
          format: int64
          description: Currently used heap memory in megabytes
        maxMb:
          type: integer
          format: int64
          description: Maximum available heap memory in megabytes
        usagePercent:
          type: number
          format: double
          description: "Heap usage as a percentage (0.0 - 100.0)"

    # -----------------------------------------------------------------------
    # Sessions
    # -----------------------------------------------------------------------
    SessionInfo:
      type: object
      description: >
        Lightweight summary of a visualization session, returned when
        listing all sessions.
      required: [sessionId, coroutineCount, eventCount]
      properties:
        sessionId:
          type: string
          description: Unique session identifier
        coroutineCount:
          type: integer
          description: Number of coroutines tracked in this session
        eventCount:
          type: integer
          description: Total number of events recorded in this session

    SessionSnapshotResponse:
      type: object
      description: >
        Full current-state snapshot of a session, including the list of all
        coroutine nodes and their states.
      required: [sessionId, coroutineCount, eventCount, coroutines]
      properties:
        sessionId:
          type: string
          description: Unique session identifier
        coroutineCount:
          type: integer
          description: Number of coroutines in the session
        eventCount:
          type: integer
          description: Total number of events recorded
        coroutines:
          type: array
          description: All coroutine nodes in the session
          items:
            $ref: "#/components/schemas/CoroutineNodeDto"

    CoroutineNodeDto:
      type: object
      description: >
        Serializable representation of a coroutine's current state within a
        session snapshot.
      required: [id, jobId, scopeId, state]
      properties:
        id:
          type: string
          description: Unique coroutine identifier
        jobId:
          type: string
          description: Associated Job identifier
        parentId:
          type: string
          nullable: true
          description: Parent coroutine ID, null for root coroutines
        scopeId:
          type: string
          description: Owning VizScope identifier
        label:
          type: string
          nullable: true
          description: Human-readable label (if assigned)
        state:
          type: string
          description: "Current coroutine state"
          enum: [CREATED, RUNNING, SUSPENDED, COMPLETED, CANCELLED, FAILED]

    # -----------------------------------------------------------------------
    # Events
    # -----------------------------------------------------------------------
    VizEvent:
      type: object
      description: >
        Base polymorphic event type. Every event carries a session ID,
        monotonic sequence number, nanosecond timestamp, and a kind
        discriminator. Concrete subtypes include CoroutineCreated,
        CoroutineStarted, CoroutineSuspended, CoroutineResumed,
        CoroutineCompleted, CoroutineCancelled, CoroutineFailed,
        ChannelCreated, ChannelSendStarted, ChannelSendCompleted,
        FlowCreated, FlowValueEmitted, and many more (32+ event types).
      required: [sessionId, seq, tsNanos, kind]
      properties:
        sessionId:
          type: string
          description: Session this event belongs to
        seq:
          type: integer
          format: int64
          description: Monotonically increasing sequence number within the session
        tsNanos:
          type: integer
          format: int64
          description: Nanosecond timestamp (from System.nanoTime())
        kind:
          type: string
          description: >
            Event type discriminator (e.g. "CoroutineCreated",
            "ChannelSendCompleted", "FlowValueEmitted")
      additionalProperties: true

    # -----------------------------------------------------------------------
    # Projections
    # -----------------------------------------------------------------------
    HierarchyNode:
      type: object
      description: >
        A node in the coroutine hierarchy tree. Contains parent-child
        relationships, state, timing, dispatcher, and thread information.
      required: [id, name, scopeId, state, createdAtNanos, jobId]
      properties:
        id:
          type: string
          description: Unique coroutine identifier
        parentId:
          type: string
          nullable: true
          description: Parent coroutine ID, null for root coroutines
        children:
          type: array
          description: Child coroutine IDs
          items:
            type: string
        name:
          type: string
          description: Display name (label or auto-generated)
        scopeId:
          type: string
          description: Owning VizScope identifier
        state:
          type: string
          description: "Current coroutine state"
          enum: [CREATED, RUNNING, SUSPENDED, COMPLETED, CANCELLED, FAILED]
        createdAtNanos:
          type: integer
          format: int64
          description: Nanosecond timestamp when the coroutine was created
        completedAtNanos:
          type: integer
          format: int64
          nullable: true
          description: Nanosecond timestamp when the coroutine finished (null if still active)
        dispatcherId:
          type: string
          nullable: true
          description: Assigned dispatcher identifier
        dispatcherName:
          type: string
          nullable: true
          description: Human-readable dispatcher name (e.g. "Dispatchers.Default")
        currentThreadId:
          type: integer
          format: int64
          nullable: true
          description: System thread ID currently executing this coroutine
        currentThreadName:
          type: string
          nullable: true
          description: Name of the thread currently executing this coroutine
        jobId:
          type: string
          description: Associated Job identifier
        exceptionType:
          type: string
          nullable: true
          description: Exception class name if the coroutine failed
        exceptionMessage:
          type: string
          nullable: true
          description: Exception message if the coroutine failed
        activeChildrenIds:
          type: array
          description: IDs of children that are still active
          items:
            type: string
        activeChildrenCount:
          type: integer
          description: Number of currently active children

    ThreadEvent:
      type: object
      description: >
        Records a coroutine's assignment to or release from a thread.
        Used for thread lane visualizations.
      required: [coroutineId, threadId, threadName, timestamp, eventType]
      properties:
        coroutineId:
          type: string
          description: Coroutine involved in the thread event
        threadId:
          type: integer
          format: int64
          description: System thread ID
        threadName:
          type: string
          description: Human-readable thread name
        timestamp:
          type: integer
          format: int64
          description: Nanosecond timestamp of the event
        eventType:
          type: string
          description: "Type of thread event"
          enum: [ASSIGNED, RELEASED]
        dispatcherName:
          type: string
          nullable: true
          description: Name of the dispatcher that assigned the thread

    CoroutineTimeline:
      type: object
      description: >
        Detailed timeline for a single coroutine with duration breakdown
        and ordered event summaries.
      required: [coroutineId, name, state]
      properties:
        coroutineId:
          type: string
          description: Unique coroutine identifier
        name:
          type: string
          description: Display name of the coroutine
        state:
          type: string
          description: "Current coroutine state"
          enum: [CREATED, RUNNING, SUSPENDED, COMPLETED, CANCELLED, FAILED]
        totalDuration:
          type: integer
          format: int64
          nullable: true
          description: Total time from creation to completion in nanoseconds
        activeDuration:
          type: integer
          format: int64
          nullable: true
          description: Time spent actively running (not suspended) in nanoseconds
        suspendedDuration:
          type: integer
          format: int64
          nullable: true
          description: Time spent in suspended state in nanoseconds
        parentId:
          type: string
          nullable: true
          description: Parent coroutine ID
        childrenIds:
          type: array
          description: IDs of child coroutines
          items:
            type: string
        events:
          type: array
          description: Ordered list of event summaries for this coroutine
          items:
            $ref: "#/components/schemas/TimelineEventSummary"

    TimelineEventSummary:
      type: object
      description: Simplified event summary for timeline display
      required: [seq, tsNanos, kind]
      properties:
        seq:
          type: integer
          format: int64
          description: Event sequence number
        tsNanos:
          type: integer
          format: int64
          description: Nanosecond timestamp
        kind:
          type: string
          description: Event type (e.g. "CoroutineStarted", "CoroutineSuspended")
        threadName:
          type: string
          nullable: true
          description: Thread name at the time of the event
        dispatcherName:
          type: string
          nullable: true
          description: Dispatcher name at the time of the event
        reason:
          type: string
          nullable: true
          description: Reason for suspension (for suspension events)

    # -----------------------------------------------------------------------
    # Comparison
    # -----------------------------------------------------------------------
    SessionComparison:
      type: object
      description: >
        Structured diff between two visualization sessions, including
        aggregate metrics and per-coroutine breakdowns.
      required:
        - sessionA
        - sessionB
        - coroutineCountDiff
        - eventCountDiff
        - totalDurationDiffNanos
        - coroutinesOnlyInA
        - coroutinesOnlyInB
        - commonCoroutines
      properties:
        sessionA:
          type: string
          description: ID of the first (baseline) session
        sessionB:
          type: string
          description: ID of the second (comparison) session
        coroutineCountDiff:
          type: integer
          description: Difference in coroutine count (B minus A)
        eventCountDiff:
          type: integer
          description: Difference in event count (B minus A)
        totalDurationDiffNanos:
          type: integer
          format: int64
          description: Difference in total session duration in nanoseconds (B minus A)
        coroutinesOnlyInA:
          type: array
          description: Coroutine IDs present only in session A
          items:
            type: string
        coroutinesOnlyInB:
          type: array
          description: Coroutine IDs present only in session B
          items:
            type: string
        commonCoroutines:
          type: array
          description: Per-coroutine comparison for coroutines in both sessions
          items:
            $ref: "#/components/schemas/CoroutineComparison"

    CoroutineComparison:
      type: object
      description: >
        Comparison of a single coroutine that exists in both sessions.
      required: [coroutineId, stateA, stateB, eventCountA, eventCountB]
      properties:
        coroutineId:
          type: string
          description: Shared coroutine identifier
        label:
          type: string
          nullable: true
          description: Coroutine label (taken from session A if available)
        stateA:
          type: string
          description: Coroutine state in session A
        stateB:
          type: string
          description: Coroutine state in session B
        eventCountA:
          type: integer
          description: Number of events for this coroutine in session A
        eventCountB:
          type: integer
          description: Number of events for this coroutine in session B

    # -----------------------------------------------------------------------
    # Validation
    # -----------------------------------------------------------------------
    ValidationResponse:
      type: object
      description: >
        Aggregated validation results for a session, including individual
        rule outcomes and a timing analysis report.
      required: [sessionId, results, timing]
      properties:
        sessionId:
          type: string
          description: Session that was validated
        results:
          type: array
          description: Individual validation rule results (Pass or Fail)
          items:
            $ref: "#/components/schemas/ValidationResult"
        timing:
          $ref: "#/components/schemas/TimingReport"

    ValidationResult:
      type: object
      description: >
        Result of a single validation rule. Discriminated by type field:
        "Pass" when the rule succeeded, "Fail" when it detected a violation.
      required: [type, ruleName, message]
      properties:
        type:
          type: string
          description: Discriminator for Pass or Fail
          enum: [Pass, Fail]
        ruleName:
          type: string
          description: Machine-readable name of the validation rule
        message:
          type: string
          description: Human-readable summary of the result
        details:
          type: string
          description: Detailed failure information (only present on Fail results)
      discriminator:
        propertyName: type

    ValidationRule:
      type: object
      description: Descriptor for an available validation rule
      required: [name, description]
      properties:
        name:
          type: string
          description: Machine-readable rule name (e.g. "CreatedHasStarted")
        description:
          type: string
          description: Human-readable explanation of what the rule checks

    TimingReport:
      type: object
      description: >
        Timing analysis of a coroutine event stream, containing per-coroutine
        durations, suspension breakdowns, and the overall stream duration.
      required: [coroutineDurations, suspensionDurations, totalDuration]
      properties:
        coroutineDurations:
          type: object
          description: >
            Map of coroutine ID to total duration in nanoseconds (from first
            event to last event for that coroutine)
          additionalProperties:
            type: integer
            format: int64
        suspensionDurations:
          type: object
          description: >
            Map of coroutine ID to list of individual suspension durations
            in nanoseconds
          additionalProperties:
            type: array
            items:
              type: integer
              format: int64
        totalDuration:
          type: integer
          format: int64
          description: Overall duration of the event stream in nanoseconds

    # -----------------------------------------------------------------------
    # Scenarios
    # -----------------------------------------------------------------------
    ScenarioResponse:
      type: object
      description: Simple success/message response for scenario endpoints
      required: [success, message]
      properties:
        success:
          type: boolean
          description: Whether the scenario completed successfully
        message:
          type: string
          description: Human-readable result message

    ScenarioCompletionResponse:
      type: object
      description: >
        Detailed response returned after a built-in scenario completes,
        including the session ID for follow-up queries and event streaming.
      required: [success, sessionId, message, coroutineCount, eventCount]
      properties:
        success:
          type: boolean
          description: Whether the scenario completed successfully
        sessionId:
          type: string
          description: Session ID where the scenario events were recorded
        message:
          type: string
          description: Human-readable result message
        coroutineCount:
          type: integer
          description: Number of coroutines created during the scenario
        eventCount:
          type: integer
          description: Total number of events produced by the scenario

    ScenarioResultData:
      type: object
      description: >
        Inline scenario results containing the full event list and coroutine
        node data in a single response. Used by the viz helper endpoint.
      required: [success, sessionId, events, coroutines, eventCount]
      properties:
        success:
          type: boolean
          description: Whether the scenario completed successfully
        sessionId:
          type: string
          description: Temporary session ID
        events:
          type: array
          description: All events produced by the scenario
          items:
            $ref: "#/components/schemas/VizEvent"
        coroutines:
          type: array
          description: All coroutine nodes and their final states
          items:
            $ref: "#/components/schemas/CoroutineNodeDto"
        eventCount:
          type: integer
          description: Total number of events

    ScenarioExecutionResponse:
      type: object
      description: >
        Response from custom scenario execution. Includes optional error
        details on failure.
      required: [success, sessionId, message]
      properties:
        success:
          type: boolean
          description: Whether the scenario completed successfully
        sessionId:
          type: string
          description: Session ID (empty string on validation errors)
        message:
          type: string
          description: Human-readable result or error message
        coroutineCount:
          type: integer
          description: Number of coroutines created (0 on failure)
        eventCount:
          type: integer
          description: Total number of events produced (0 on failure)
        errors:
          type: array
          nullable: true
          description: Error details (stack traces or validation messages)
          items:
            type: string

    ScenarioConfigRequest:
      type: object
      description: >
        User-defined scenario configuration. Defines a tree of coroutines
        with actions to execute. Submitted as the request body for the
        custom scenario endpoint.
      required: [name, root]
      properties:
        name:
          type: string
          description: Display name for the scenario
        description:
          type: string
          nullable: true
          description: Optional description of what the scenario demonstrates
        sessionId:
          type: string
          nullable: true
          description: Existing session ID to reuse (creates new if omitted)
        root:
          $ref: "#/components/schemas/CoroutineConfigDTO"

    CoroutineConfigDTO:
      type: object
      description: >
        Configuration for a single coroutine in a custom scenario tree.
        Coroutines can have actions and nested children.
      required: [id, label]
      properties:
        id:
          type: string
          description: Unique identifier for this coroutine within the scenario
        label:
          type: string
          description: Display label for the coroutine
        parentId:
          type: string
          nullable: true
          description: Parent coroutine ID (for flat configuration style)
        actions:
          type: array
          description: Actions to execute inside this coroutine
          items:
            $ref: "#/components/schemas/ActionDTO"
        children:
          type: array
          description: Child coroutines launched within this coroutine
          items:
            $ref: "#/components/schemas/CoroutineConfigDTO"

    ActionDTO:
      type: object
      description: >
        An action to execute inside a coroutine. Supported types are
        "delay", "throw"/"exception", "log", and "custom".
      required: [type]
      properties:
        type:
          type: string
          description: >
            Action type: "delay" (pause execution), "throw"/"exception"
            (throw an exception), "log" (log a message), "custom"
            (execute custom code)
          enum: [delay, throw, exception, log, custom]
        params:
          type: object
          description: >
            Action-specific parameters. For "delay": durationMs (long).
            For "throw": exceptionType (string), message (string).
            For "log": message (string). For "custom": code (string).
          additionalProperties:
            type: string

    SyncScenarioResponse:
      type: object
      description: >
        Response from synchronization primitive scenario execution.
      required: [success, sessionId, scenario, message]
      properties:
        success:
          type: boolean
          description: Whether the scenario completed successfully
        sessionId:
          type: string
          description: Session ID where events were recorded (empty on failure)
        scenario:
          type: string
          description: Name of the scenario that was executed
        message:
          type: string
          description: Human-readable result message
        eventCount:
          type: integer
          description: Number of events produced (0 on failure)

    ScenarioInfo:
      type: object
      description: >
        Descriptor for a synchronization scenario in the catalog.
      required: [path, name, type, description]
      properties:
        path:
          type: string
          description: URL path suffix (e.g. "mutex/counter")
        name:
          type: string
          description: Human-readable scenario name
        type:
          type: string
          description: Category of sync primitive (Mutex, Semaphore, Combined)
        description:
          type: string
          description: Brief description of what the scenario demonstrates

    ScenarioCatalogEntry:
      type: object
      description: >
        Entry in the general scenario catalog. Includes metadata for
        display in the frontend scenario picker.
      required: [id, name, description, endpoint]
      properties:
        id:
          type: string
          description: Unique scenario identifier
        name:
          type: string
          description: Human-readable display name
        description:
          type: string
          description: Detailed description of the scenario
        endpoint:
          type: string
          description: HTTP endpoint to trigger the scenario
        category:
          type: string
          description: Scenario category (basic, channel, realistic, flow, pattern)
        duration:
          type: string
          description: Estimated execution duration (e.g. "~2-3 seconds")

    PatternInfo:
      type: object
      description: >
        Entry in the pattern scenario catalog with full metadata.
      required: [id, name, description, endpoint, duration]
      properties:
        id:
          type: string
          description: Unique pattern identifier
        name:
          type: string
          description: Human-readable pattern name
        description:
          type: string
          description: Detailed description of the concurrency pattern
        endpoint:
          type: string
          description: HTTP endpoint to trigger the pattern scenario
        category:
          type: string
          description: Always "pattern"
          default: pattern
        duration:
          type: string
          description: Estimated execution duration
