services:
  backend:
    image: ghcr.io/hermanngeorge15/visualizer-for-coroutines/backend:${TAG:-latest}
    ports:
      - "8080:8080"
    environment:
      - PORT=8080
      - CORS_ALLOWED_ORIGINS=${CORS_ALLOWED_ORIGINS:-https://your-frontend-domain.com}
      - SESSION_MAX_AGE_MS=${SESSION_MAX_AGE_MS:-3600000}
      - SESSION_MAX_COUNT=${SESSION_MAX_COUNT:-100}
      - JAVA_OPTS=${JAVA_OPTS:--Xmx512m -Xms256m}
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8080/health"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 30s
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 768M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  frontend:
    image: ghcr.io/hermanngeorge15/visualizer-for-coroutines/frontend:${TAG:-latest}
    ports:
      - "3000:3000"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
